<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Ring — encrypted messenger" />
    <meta name="color-scheme" content="dark light" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#0f1c2e" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#f4f7fb" media="(prefers-color-scheme: light)" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
      media="(prefers-color-scheme: dark)"
    />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="default"
      media="(prefers-color-scheme: light)"
    />
    <!-- v=7: Safari/Firefox → apple-touch + og:image; Chrome/Edge iOS → manifest icons. -->
    <link rel="apple-touch-icon" href="/apple-touch-icon.png?v=7" />
    <link rel="apple-touch-icon" sizes="256x256" href="/ring-share-256.png?v=7" />
    <link rel="apple-touch-icon-precomposed" href="/apple-touch-icon-precomposed.png?v=7" />
    <link rel="icon" type="image/png" href="/favicon.png?v=7" />
    <link rel="icon" type="image/png" sizes="180x180" href="/apple-touch-icon.png?v=7" />
    <link rel="icon" type="image/png" sizes="256x256" href="/ring-share-256.png?v=7" />
    <link rel="icon" type="image/png" sizes="512x512" href="/pwa-512x512.png?v=7" />
    <link rel="shortcut icon" type="image/png" href="/ring-share-256.png?v=7" />
    <meta property="og:image" content="/ring-share-256.png?v=7" />
    <meta property="og:image:width" content="256" />
    <meta property="og:image:height" content="256" />
    <meta property="og:image:type" content="image/png" />
    <meta name="twitter:image" content="/ring-share-256.png?v=7" />
    <script src="/ring-boot.js"></script>
    <script src="/ring-icons.js"></script>
    <style>
      #ring-markers {
        display: none !important;
      }
      html[data-ring-view='standalone'] .ring-boot-coach,
      html[data-ring-view='standalone'] .ring-boot-unavailable,
      html[data-ring-view='coach'] .ring-boot-shell,
      html[data-ring-view='coach'] .ring-boot-unavailable,
      html[data-ring-view='browser'] .ring-boot-shell,
      html[data-ring-view='browser'] .ring-boot-unavailable {
        display: none !important;
      }
      html:not([data-ring-view]) .ring-boot-shell,
      html:not([data-ring-view]) .ring-boot-coach,
      html:not([data-ring-view]) .ring-boot-unavailable {
        display: none !important;
      }

      /* Launch splash + privacy shield. Brand colours are hardcoded (theme.css
         vars are not applied until hydration). Covers the standalone shell from
         first paint (cold rule below) so app content never flashes first, and
         re-covers on blur/hidden for the iOS app-switcher snapshot. */
      #ring-shield {
        position: fixed;
        inset: 0;
        z-index: 2147483647;
        /* The logo is centred via a transform on the <img> itself (below), not
           flexbox, so it is positioned on the compositor layer and painted at
           its final spot in the first frame — no layout-pass settle that would
           make it appear low then snap up on a cold standalone launch. */
        background: #0f1c2e;
        color: #e8eef4;
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
        /* Promote to its own layer so showing it on background is a cheap
           compositor op (best chance of painting before the iOS snapshot). */
        will-change: opacity;
        transition:
          opacity 0.45s ease,
          visibility 0.45s ease;
        font-family:
          system-ui,
          -apple-system,
          sans-serif;
      }
      @media (prefers-color-scheme: light) {
        #ring-shield {
          background: #f4f7fb;
          color: #0f1c2e;
        }
      }
      /* Cold-launch cover in standalone, before the controller script runs. */
      html[data-ring-view='standalone']:not([data-shield-ready]) #ring-shield {
        opacity: 1;
        visibility: visible;
        pointer-events: auto;
        transition: none;
      }
      /* Controller-driven states (launch hold + privacy cover). */
      #ring-shield.show {
        opacity: 1;
        visibility: visible;
        pointer-events: auto;
      }
      #ring-shield.show.instant {
        transition: none;
      }
      #ring-shield img {
        position: absolute;
        top: 50%;
        left: 50%;
        width: 6rem;
        height: 6rem;
        border-radius: 1.35rem;
        transform: translate(-50%, -50%);
        /* Start hidden and fade in after a short delay so the logo only appears
           AFTER iOS has finished the cold-launch layout pass — the viewer never
           sees it paint low and snap up to centre. The shield background still
           covers from the first frame, so no app content flashes. */
        opacity: 0;
        animation: ring-logo-in 0.45s ease 0.5s forwards;
      }
      @keyframes ring-logo-in {
        to {
          opacity: 1;
        }
      }
      /* Name + version hang below the centred logo (viewport centre + half the
         6rem logo + a small gap) and fade in on the same delayed animation, so
         the whole splash appears together once the launch layout has settled. */
      #ring-shield .ring-shield-text {
        position: absolute;
        top: calc(50% + 3rem + 1rem);
        left: 0;
        right: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0.35rem;
        opacity: 0;
        animation: ring-logo-in 0.45s ease 0.5s forwards;
      }
      #ring-shield .ring-shield-name {
        font-size: 1.75rem;
        font-weight: 700;
      }
      #ring-shield .ring-shield-version {
        font-size: 0.85rem;
        /* Reserve the line height so filling the version in after hydration does
           not shift the text block (the logo is unaffected either way). */
        min-height: 1.25rem;
        line-height: 1.25rem;
        opacity: 0.7;
      }
      @media (prefers-reduced-motion: reduce) {
        /* Keep the delay (still hides the settle) but drop the fade motion. */
        #ring-shield img,
        #ring-shield .ring-shield-text {
          animation-duration: 0.001s;
        }
      }
    </style>
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div id="ring-shield" data-testid="splash" aria-hidden="true">
      <img src="/apple-touch-icon.png" alt="" width="96" height="96" />
      <div class="ring-shield-text">
        <div class="ring-shield-name">Ring</div>
        <div class="ring-shield-version" id="ring-shield-version"></div>
      </div>
    </div>
    <div style="display: contents">%sveltekit.body%</div>
    <script>
      // Launch-splash + privacy-shield controller. Runs after the body parses;
      // until then the cold-cover CSS rule keeps the standalone shell covered.
      (function () {
        var html = document.documentElement;
        var shield = document.getElementById('ring-shield');
        if (!shield) return;
        var standalone =
          (window.matchMedia && window.matchMedia('(display-mode: standalone)').matches) ||
          window.navigator.standalone === true;
        function show(instant) {
          shield.classList.add('show');
          if (instant) shield.classList.add('instant');
        }
        function hide() {
          shield.classList.remove('show', 'instant');
        }
        // Hand off from the cold-cover CSS rule to the class-based states.
        html.setAttribute('data-shield-ready', '');
        if (!standalone) {
          hide();
          return;
        }
        // Launch splash: keep covering, then fade out after a ~2.5–3.5s hold.
        show(false);
        setTimeout(hide, 2500 + Math.random() * 1000);
        // Privacy: re-cover whenever the app is backgrounded or loses focus
        // (e.g. the iOS app switcher) so the snapshot does not reveal content.
        var cover = function () {
          show(true);
        };
        document.addEventListener('visibilitychange', function () {
          if (document.hidden) cover();
          else hide();
        });
        window.addEventListener('blur', cover);
        window.addEventListener('focus', hide);
        window.addEventListener('pagehide', cover);
      })();
    </script>
  </body>
</html>
