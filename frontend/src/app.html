<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Ring — encrypted messenger" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#0f1c2e" />
    <!-- apple-touch-icon + the iOS apple-touch-startup-image splash links are
         injected from the generated pwaAssets head set in +layout.svelte, so the
         hrefs always match the emitted PNG filenames (SC-009). -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
