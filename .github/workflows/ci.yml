name: CI

# Per spec 001 research R7 / task T030. Three jobs gate every PR (and every
# push to main): fast backend lint+unit, frontend lint+typecheck+unit, and a
# slower testcontainers-backed integration job. The integration job proves the
# embedded-frontend + Caddy-fronted-TLS slice end-to-end (FR-007).

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: backend (go ${{ matrix.go-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Constitution "two most recent Go releases". go.mod requires 1.26, so
        # the 1.25 entry exercises the toolchain auto-upgrade path (GOTOOLCHAIN
        # defaults to auto) rather than a true 1.25 build.
        go-version: ['1.26', '1.25']
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
          cache-dependency-path: backend/go.sum

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.12.2
          working-directory: backend

      - name: govulncheck
        run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...

      - name: go test (unit, no integration tag)
        run: go test ./...

  frontend:
    name: frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install deps
        run: pnpm install --frozen-lockfile

      # Generate .svelte-kit/tsconfig.json (extended by tsconfig.json) so
      # svelte-check and tsc have the SvelteKit-managed config to build on.
      - name: SvelteKit sync
        run: pnpm exec svelte-kit sync

      - name: ESLint
        run: pnpm exec eslint .

      - name: Prettier check
        run: pnpm exec prettier --check .

      - name: svelte-check
        run: pnpm exec svelte-check --tsconfig ./tsconfig.json

      - name: tsc --noEmit
        run: pnpm exec tsc --noEmit

      - name: Vitest
        run: pnpm test

  integration:
    name: integration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache-dependency-path: backend/go.sum

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install frontend deps
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      # Build the SvelteKit shell and stage it into the Go embed root. The
      # integration test rebuilds with its own marker version, but staging here
      # mirrors the production pipeline (T019/T028) and guarantees embed input
      # exists before the test's `go build ./cmd/ring`.
      - name: Build frontend and stage embed
        working-directory: frontend
        run: |
          RING_VERSION="$(git describe --tags --dirty --always 2>/dev/null || echo dev)" \
          RING_COMMIT="$(git rev-parse HEAD 2>/dev/null || echo unknown)" \
            pnpm run build
          rm -rf ../backend/internal/web/dist
          mkdir -p ../backend/internal/web/dist
          cp -R build/. ../backend/internal/web/dist/

      - name: Integration test (testcontainers)
        working-directory: backend
        run: go test -tags=integration ./test/integration/...
